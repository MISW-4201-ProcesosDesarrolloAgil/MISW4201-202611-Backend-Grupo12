name:  Flask CI y merge con develop

on:
  push:
    branches:
      - "feature/*"

permissions:
  contents: write
  pull-requests: write

jobs:
  job-pruebas:
    name: Ejecutar pruebas automáticas Flask
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[FINISHED]')

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar variables de entorno Flask
        run: |
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "FLASK_APP=app.py" >> $GITHUB_ENV

      - name: Ejecutar pruebas unitarias
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

  job-merge-develop:
    name: Merge automático a develop
    runs-on: ubuntu-latest
    needs: job-pruebas
    if: contains(github.event.head_commit.message, '[FINISHED]')

    steps:
      - name: Merge de feature a develop
        uses: tukasz/direct-merge-action@master
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          source-branch: ${{ github.ref_name }}
          target-branch: develop
          commit-message: "Merge automático Flask: ${{ github.ref_name }} → develop"
